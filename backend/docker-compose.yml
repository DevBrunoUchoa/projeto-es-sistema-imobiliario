# ---------------------------------------------------------------------------
# Sobe o banco PostgreSQL/PostGIS e (opcionalmente) a aplicação.
# As variáveis vêm do arquivo .env (copie de .env.example).
#
#   docker compose up -d db     -> apenas o banco (rode a app pela IDE/Maven)
#   docker compose up --build   -> banco + aplicação
# ---------------------------------------------------------------------------
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: campus-living-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-living-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      APP_PORT: 8080
      # Datasource apontando para o serviço "db" da rede do compose
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-anuncios}
      # Opcional: sobrescreve as flags de JVM definidas no Dockerfile
      # (ex.: JAVA_OPTS=-Xmx256m no seu .env) sem precisar rebuildar a imagem.
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}
    ports:
      - "${APP_PORT:-8080}:8080"
    # O HEALTHCHECK em si vem do Dockerfile (consulta /actuator/health);
    # aqui só reaproveitamos esse status pra decidir quando o container está
    # "pronto" em orquestradores que respeitam isso (ex.: `docker compose ps`).

volumes:
  postgres_data:
