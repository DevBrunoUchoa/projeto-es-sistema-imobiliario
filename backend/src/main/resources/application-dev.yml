# ---------------------------------------------------------------------------
# Profile: dev
# Banco local (Docker Compose ou PostgreSQL local). Credenciais via .env.
# ---------------------------------------------------------------------------
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:campus_living}}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: true
  # Em dev, além das migrations, também carrega o seed de dados
  # fictícios (db/seed/V900__seed_dev.sql).
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration,classpath:db/seed
    # O seed de dev é V900 (número alto de propósito). Como ele já está
    # aplicado, toda migration nova (ex.: V23) fica "fora de ordem" em relação
    # a ele — sem isso, o Flyway recusa e a aplicação não sobe. Em dev é seguro
    # permitir; em prod não há seed, então esse cenário não ocorre.
    out-of-order: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
# Chave de assinatura JWT. Em dev há um valor padrão inseguro só para não
# travar o ambiente local; em produção NÃO existe padrão (ver application-prod).
jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789abcdef0123456789abcdef}