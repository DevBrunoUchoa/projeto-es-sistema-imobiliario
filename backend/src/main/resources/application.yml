# ---------------------------------------------------------------------------
# Configuração comum a todos os ambientes (sem segredos).
# Credenciais ficam exclusivamente nos profiles e vêm de variáveis de ambiente.
# ---------------------------------------------------------------------------
spring:
  application:
    name: campus-living-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    # O Flyway é quem cria/altera tabelas (src/main/resources/db/migration).
    # O Hibernate NUNCA gera DDL sozinho — "ddl-auto: validate" em todo profile
    # só confere se as entidades @Entity batem com o schema que o Flyway
    # aplicou; se alguém adicionar um campo na entidade sem migration
    # correspondente, a aplicação falha ao subir em vez de alterar a tabela
    # "silenciosamente".
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # RNF/SEG-05: documentos de verificação de locador (T5.4) limitados a 5MB.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 55MB
  # SMTP para o envio real de e-mail (RF-04/05/38). Só é efetivamente usado
  # quando app.mail.enabled=true (ver abaixo); sem isso configurado, o
  # EmailService cai no log e nunca chega a chamar o JavaMailSender.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  # Provedores como o Render injetam a porta na variável PORT. Preferimos ela;
  # caímos para APP_PORT (Docker Compose local) e, por fim, 8080.
  port: ${PORT:${APP_PORT:8080}}

# Diretório onde documentos/uploads são salvos localmente (T5.4/T5.9).
# Interino: em produção com filesystem efêmero isso NÃO persiste entre
# deploys/restarts — ver comentário em LocalDiskDocumentStorageService.
app:
  # Cookies de sessão (jwt/refresh) só com flag Secure quando servidos por
  # HTTPS. Default false para funcionar em http://localhost; sobrescrito para
  # true no profile prod (RNF/SEG-03).
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  # URL base usada nos links dos e-mails (verificação/reset). Aponta para o
  # frontend em produção; localhost em dev.
  frontend-url: ${APP_FRONTEND_URL:http://localhost:8080}
  # Envio de e-mail (RF-04/05/38). Desabilitado por padrão: sem SMTP
  # configurado, os links são apenas logados (nunca devolvidos na resposta).
  mail:
    enabled: ${MAIL_ENABLED:false}
    # Precisa ser um remetente verificado no provedor SMTP (ex.: no Brevo, a
    # conta/domínio cadastrado em "Senders & IP"), senão o envio é rejeitado.
    from: ${MAIL_FROM:no-reply@campusliving.app}
  # Geocodificação de endereços e distância até a UFCG (RF-16).
  geocoding:
    enabled: ${GEOCODING_ENABLED:true}
    nominatim-url: ${NOMINATIM_URL:https://nominatim.openstreetmap.org}
    user-agent: ${GEOCODING_USER_AGENT:CampusLiving/1.0 (contato@campusliving.app)}
    # Chave de API para provedores compatíveis com Nominatim (ex.: LocationIQ).
    # Vazio = Nominatim público (só funciona fora de nuvem; em nuvem dá 429).
    # Em produção: NOMINATIM_URL=https://us1.locationiq.com/v1 + GEOCODING_API_KEY=<chave>
    api-key: ${GEOCODING_API_KEY:}
    # Coordenadas do campus da UFCG em Campina Grande-PB (portão principal).
    ufcg-lat: ${UFCG_LAT:-7.21528}
    ufcg-lon: ${UFCG_LON:-35.90894}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
  storage:
    supabase:
      url: ${SUPABASE_URL:}
      service-key: ${SUPABASE_SERVICE_ROLE_KEY:}
      bucket: ${SUPABASE_STORAGE_BUCKET:anuncios}

# OpenAPI / Swagger (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# Endpoints de observabilidade (usados por Docker/CI e operação)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
