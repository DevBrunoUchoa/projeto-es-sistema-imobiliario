# ---------------------------------------------------------------------------
# Profile: prod
# Todas as credenciais são OBRIGATÓRIAS via variáveis de ambiente.
# Sem valores padrão -> a aplicação falha rápido se algo não for fornecido.
# ---------------------------------------------------------------------------
spring:
  datasource:
    # SPRING_DATASOURCE_URL deve apontar para o SESSION POOLER do Supabase
    # (porta 5432 no host *.pooler.supabase.com), não para a "Direct
    # connection" nem para o transaction pooler (porta 6543). Motivo completo
    # comentado em .env.example — resumindo: session pooler resolve o
    # problema de IPv4 (a maioria dos hosts de app não fala IPv6 de saída)
    # sem quebrar prepared statements do Hibernate, e o HikariCP abaixo já
    # cuida do pooling do lado da aplicação.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      pool-name: CampusLivingHikariPool
      # Supabase (free tier) limita o total de conexões simultâneas do lado do
      # servidor bem mais do que um Postgres dedicado — um pool grande demais
      # aqui derruba OUTROS serviços que compartilham o mesmo banco. Ajuste via
      # env var se o plano mudar; não aumente "no escuro".
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000   # 30s esperando uma conexão livre do pool
      idle-timeout: 600000        # 10min: fecha conexões ociosas
      max-lifetime: 1800000       # 30min: recicla conexões periodicamente
      validation-timeout: 5000
      # RNF/SEG-03: TLS obrigatório em qualquer ambiente de produção,
      # independente do que estiver (ou não) escrito na URL fornecida —
      # não confiamos que quem colar a SPRING_DATASOURCE_URL vai lembrar de
      # incluir "?sslmode=require" manualmente.
      data-source-properties:
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  # Login social (Google). Assim como JWT_SECRET/SPRING_DATASOURCE_* acima,
  # sem valor padrão: GOOGLE_CLIENT_ID e GOOGLE_CLIENT_SECRET passam a ser
  # OBRIGATÓRIAS a partir desta seção existir — a aplicação falha ao subir se
  # não forem fornecidas (mesmo padrão "fail fast" do restante deste arquivo).
  # Sem esta seção, a rota /oauth2/authorization/google não existe no backend
  # e o botão "Entrar com Google" responde 404 "Rota não encontrada".
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

logging:
  level:
    org.flywaydb: INFO

# RNF/SEG-02/03: em produção não há valores padrão. A aplicação falha ao
# subir se JWT_SECRET não for fornecido, e os cookies de sessão exigem HTTPS.
jwt:
  secret: ${JWT_SECRET}
app:
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
# Em produção a aplicação roda atrás de um proxy TLS (ex.: Render), que termina
# o HTTPS e repassa a requisição por HTTP com o header X-Forwarded-Proto=https.
# Sem isto, o Spring "acha" que a requisição é HTTP e gera URLs erradas —
# quebrando o redirect do OAuth2 (login Google) e a coerência dos cookies
# Secure. "framework" faz o Spring honrar os cabeçalhos X-Forwarded-* do proxy.
# (RNF/SEG-03. O HSTS já vem habilitado por padrão pelo Spring Security sobre HTTPS.)
server:
  forward-headers-strategy: framework
