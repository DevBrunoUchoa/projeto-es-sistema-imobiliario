name: CI

# Executa build e testes automaticamente a cada Pull Request para a main.
# (RNF/PROC-05 - integração contínua a cada pull request)
#
# Estrutura monorepo: o backend fica em backend/. Este workflow precisa viver
# na RAIZ do repositório (o GitHub Actions só lê .github/workflows/ da raiz),
# mas compila dentro de backend/ via working-directory.
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build and run tests
        # 'verify' compila, empacota e executa os testes.
        # O runner ubuntu-latest possui Docker, requerido pelo Testcontainers.
        run: mvn -B verify
