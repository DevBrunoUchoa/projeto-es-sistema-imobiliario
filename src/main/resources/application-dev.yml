# ---------------------------------------------------------------------------
# Profile: dev
# Banco local (Docker Compose ou PostgreSQL local). Credenciais via .env.
# ---------------------------------------------------------------------------
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:campus_living}}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: true
  # Em dev, além das migrations "de verdade", também carrega o seed de dados
  # fictícios (db/seed/V900__seed_dev.sql). Isso NUNCA roda em test/prod,
  # porque essas duas locations só existem juntas aqui no profile dev.
  flyway:
    locations: classpath:db/migration,classpath:db/seed
