# ---------------------------------------------------------------------------
# Profile: prod
# Todas as credenciais são OBRIGATÓRIAS via variáveis de ambiente.
# Sem valores padrão -> a aplicação falha rápido se algo não for fornecido.
# ---------------------------------------------------------------------------
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
