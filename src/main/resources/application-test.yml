# ---------------------------------------------------------------------------
# Profile: test
# A fonte de dados é provida em tempo de execução pelo Testcontainers
# (PostGIS) via @ServiceConnection — não há credenciais aqui.
#
# O Flyway roda as mesmas migrations de produção contra o container efêmero
# (nada de "create-drop" do Hibernate): assim os testes validam o schema real,
# não uma versão gerada automaticamente que pode divergir do que sobe em prod.
# ---------------------------------------------------------------------------
spring:
  jpa:
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test
            client-secret: test
jwt:
  secret: ${JWT_SECRET:test-only-secret-0123456789abcdef0123456789abcdef0123456789}

# Testes não fazem chamadas HTTP externas de geocodificação.
app:
  geocoding:
    enabled: false
