# ---------------------------------------------------------------------------
# Configuração comum a todos os ambientes (sem segredos).
# Credenciais ficam exclusivamente nos profiles e vêm de variáveis de ambiente.
# ---------------------------------------------------------------------------
spring:
  application:
    name: campus-living-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${APP_PORT:8080}

# OpenAPI / Swagger (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# Endpoints de observabilidade (usados por Docker/CI e operação)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
