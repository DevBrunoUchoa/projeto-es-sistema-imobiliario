# ---------------------------------------------------------------------------
# Configuração comum a todos os ambientes (sem segredos).
# Credenciais ficam exclusivamente nos profiles e vêm de variáveis de ambiente.
# ---------------------------------------------------------------------------
spring:
  application:
    name: campus-living-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    # O Flyway é quem cria/altera tabelas (src/main/resources/db/migration).
    # O Hibernate NUNCA gera DDL sozinho — "ddl-auto: validate" em todo profile
    # só confere se as entidades @Entity batem com o schema que o Flyway
    # aplicou; se alguém adicionar um campo na entidade sem migration
    # correspondente, a aplicação falha ao subir em vez de alterar a tabela
    # "silenciosamente".
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # RNF/SEG-05: documentos de verificação de locador (T5.4) limitados a 5MB.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 55MB

server:
  port: ${APP_PORT:8080}

# Diretório onde documentos/uploads são salvos localmente (T5.4/T5.9).
# Interino: em produção com filesystem efêmero isso NÃO persiste entre
# deploys/restarts — ver comentário em LocalDiskDocumentStorageService.
app:
  # Cookies de sessão (jwt/refresh) só com flag Secure quando servidos por
  # HTTPS. Default false para funcionar em http://localhost; sobrescrito para
  # true no profile prod (RNF/SEG-03).
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  # URL base usada nos links dos e-mails (verificação/reset). Aponta para o
  # frontend em produção; localhost em dev.
  frontend-url: ${APP_FRONTEND_URL:http://localhost:8080}
  # Envio de e-mail (RF-04/05/38). Desabilitado por padrão: sem SMTP
  # configurado, os links são apenas logados (nunca devolvidos na resposta).
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@campusliving.app}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
  storage:
    supabase:
      url: ${SUPABASE_URL:}
      service-key: ${SUPABASE_SERVICE_ROLE_KEY:}
      bucket: ${SUPABASE_STORAGE_BUCKET:anuncios}

# OpenAPI / Swagger (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# Endpoints de observabilidade (usados por Docker/CI e operação)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
