# ---------------------------------------------------------------------------
# Configuração comum a todos os ambientes (sem segredos).
# Credenciais ficam exclusivamente nos profiles e vêm de variáveis de ambiente.
# ---------------------------------------------------------------------------
spring:
  application:
    name: campus-living-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    # O Flyway é quem cria/altera tabelas (src/main/resources/db/migration).
    # O Hibernate NUNCA gera DDL sozinho — "ddl-auto: validate" em todo profile
    # só confere se as entidades @Entity batem com o schema que o Flyway
    # aplicou; se alguém adicionar um campo na entidade sem migration
    # correspondente, a aplicação falha ao subir em vez de alterar a tabela
    # "silenciosamente".
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # RNF/SEG-05: documentos de verificação de locador (T5.4) limitados a 5MB.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${APP_PORT:8080}

# Diretório onde documentos/uploads são salvos localmente (T5.4/T5.9).
# Interino: em produção com filesystem efêmero isso NÃO persiste entre
# deploys/restarts — ver comentário em LocalDiskDocumentStorageService.
app:
  uploads:
    dir: ${UPLOADS_DIR:uploads}
  # T5.5 — integrações externas usadas no cadastro de imóveis (RF-11/RF-16).
  # URLs configuráveis via variável de ambiente pra facilitar apontar pra um
  # mock em CI/testes, se algum dia isso virar um problema de flakiness.
  integrations:
    viacep:
      base-url: ${VIACEP_BASE_URL:https://viacep.com.br/ws}
    nominatim:
      base-url: ${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
  # RF-16: coordenadas de referência usadas no cálculo de distância dos
  # anúncios até a UFCG (campus principal, Bodocongó, Campina Grande-PB).
  # Aproximadas — ajustável sem precisar recompilar, caso o time queira
  # apontar pra uma entrada/portaria específica em vez do centro do campus.
  ufcg:
    latitude: ${UFCG_LATITUDE:-7.2157}
    longitude: ${UFCG_LONGITUDE:-35.9099}

# OpenAPI / Swagger (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# Endpoints de observabilidade (usados por Docker/CI e operação)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
